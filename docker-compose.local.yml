# Local Docker Compose configuration.
# Builds the application from the local Dockerfile instead of pulling an image.
#
# Traffic path:
#   client -> gateway:3000
#     /api/v3/contents/generations/tasks* -> seedance-compat:3001
#     all other paths                      -> new-api:3000

services:
  gateway:
    image: nginx:1.30.4-alpine@sha256:97d490c12ba55b4946b01546d1c3ed324e8d41ab1c9fcb2a616aa470620e5b46
    container_name: new-api-gateway
    restart: unless-stopped
    ports:
      - "${NEWAPI_BIND_ADDRESS:-127.0.0.1}:${NEWAPI_PORT:-3000}:80"
    volumes:
      - ./deploy/newapi-local/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - new-api-local-network
    depends_on:
      new-api:
        condition: service_healthy
      seedance-compat:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/status | grep -q '\"success\":[[:space:]]*true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  seedance-compat:
    build:
      context: ./deploy/newapi-local/seedance-compat
    image: seedance-compat-local:latest
    container_name: seedance-compat-local
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      LISTEN_ADDR: ":3001"
      NEWAPI_BASE_URL: "http://new-api:3000"
    networks:
      - new-api-local-network
    depends_on:
      new-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/healthz | grep -o '\"ok\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  new-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    image: new-api:local
    container_name: new-api-local
    restart: unless-stopped
    command: --log-dir /app/logs
    # Only reachable inside the compose network; public traffic goes through gateway.
    expose:
      - "3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - SQL_DSN=postgresql://${NEWAPI_POSTGRES_USER:-root}:${NEWAPI_POSTGRES_PASSWORD:-123456}@postgres:5432/${NEWAPI_POSTGRES_DB:-new-api}?sslmode=disable
      - REDIS_CONN_STRING=redis://:${NEWAPI_REDIS_PASSWORD:-123456}@redis:6379/0
      - TZ=${TZ:-Asia/Shanghai}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set in .env or shell environment}
      - CRYPTO_SECRET=${CRYPTO_SECRET:?CRYPTO_SECRET must be set in .env or shell environment}
      - OPTION_CRYPT_KEY=${OPTION_CRYPT_KEY:-}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      - NODE_NAME=${NODE_NAME:-new-api-local}
      - SKILL_HUB_OSS_ENDPOINT=${SKILL_HUB_OSS_ENDPOINT:-}
      - SKILL_HUB_OSS_BUCKET=${SKILL_HUB_OSS_BUCKET:-}
      - SKILL_HUB_OSS_ACCESS_KEY_ID=${SKILL_HUB_OSS_ACCESS_KEY_ID:-}
      - SKILL_HUB_OSS_ACCESS_KEY_SECRET=${SKILL_HUB_OSS_ACCESS_KEY_SECRET:-}
      - SKILL_HUB_OSS_PREFIX=${SKILL_HUB_OSS_PREFIX:-skill-hub/skills}
      - SKILL_HUB_OSS_SIGNED_URL_EXPIRES_SECONDS=${SKILL_HUB_OSS_SIGNED_URL_EXPIRES_SECONDS:-600}
      - SKILL_HUB_OSS_ICON_ENDPOINT=${SKILL_HUB_OSS_ICON_ENDPOINT:-}
      - SKILL_HUB_OSS_ICON_BUCKET=${SKILL_HUB_OSS_ICON_BUCKET:-}
      - SKILL_HUB_OSS_ICON_ACCESS_KEY_ID=${SKILL_HUB_OSS_ICON_ACCESS_KEY_ID:-}
      - SKILL_HUB_OSS_ICON_ACCESS_KEY_SECRET=${SKILL_HUB_OSS_ICON_ACCESS_KEY_SECRET:-}
      - SKILL_HUB_OSS_ICON_PREFIX=${SKILL_HUB_OSS_ICON_PREFIX:-skill-hub/icons}
      - SKILL_HUB_OSS_ICON_PUBLIC_BASE_URL=${SKILL_HUB_OSS_ICON_PUBLIC_BASE_URL:-}
      - SKILL_HUB_ALLOW_LOCAL_HTTP=${SKILL_HUB_ALLOW_LOCAL_HTTP:-true}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      new-api-local-network:
        aliases:
          - new-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/status | grep -q '\"success\":[[:space:]]*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.8.0@sha256:234c902a2db49461a129e2d4aeff85b28cf20187ed274a67f6e50995fa713c7b
    container_name: new-api-local-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${NEWAPI_REDIS_PASSWORD:-123456}
    command: ["redis-server", "--requirepass", "${NEWAPI_REDIS_PASSWORD:-123456}"]
    networks:
      - new-api-local-network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q '^PONG$' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:15.18@sha256:74e110c41804365e3915fcc09d5e7a1eff50161aaa94d5da0e58e0cd75ae509c
    container_name: new-api-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${NEWAPI_POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${NEWAPI_POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${NEWAPI_POSTGRES_DB:-new-api}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - pg_data_local:/var/lib/postgresql/data
    networks:
      - new-api-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_data_local:

networks:
  new-api-local-network:
    driver: bridge
