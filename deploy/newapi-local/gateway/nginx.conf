events {}

http {
  # Docker recreates containers with new IPs. Resolve service names at request
  # time so the gateway does not retain a stale upstream address.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;

    set $new_api_backend new-api:3000;
    set $seedance_compat_backend seedance-compat:3001;

    client_max_body_size 100m;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /api/v3/contents/generations/tasks {
      proxy_pass http://$seedance_compat_backend;
    }

    location ^~ /api/v3/contents/generations/tasks/ {
      proxy_pass http://$seedance_compat_backend;
    }

    location / {
      proxy_pass http://$new_api_backend;
    }
  }
}
