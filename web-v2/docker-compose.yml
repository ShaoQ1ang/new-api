services:
  web-v2:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        ALL_PROXY: ${ALL_PROXY-}
        http_proxy: ${http_proxy-}
        https_proxy: ${https_proxy-}
        all_proxy: ${all_proxy-}
    container_name: new-api-web-v2
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      VITE_API_BASE_URL: ""
